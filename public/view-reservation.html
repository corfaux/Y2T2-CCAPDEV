<!DOCTYPE html>
<html>
    <head>
         <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>View Reservation | LabSys</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/cancel.css">
        
    </head>
    <body class="cancel-page">
        <header>
            <div class="container">
                <img src="images/dlsu-logo-white.png" alt="DLSU logo">
                <h1>LabSys</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="student-profile.html">View Profile</a></li>
                    <li><a href="reservation.html">Make a Reservation</a></li>
                </ul>
            </nav>
            <a id="logout-btn" href="index.html">Log Out</a>
        </header> 

        <div class="content"> 
            <div class="cancel-pane">
                
                <h1>
                    View Reservation
                </h1>

                <div class="reservation-pane">
                    <table class="selected-reserve">
                        <thead>

                        <tr>
                            <th>Reservation No.</th>
                            <th>Date</th>
                            <th>Building</th>
                            <th>Room No.</th>
                            <th>Number of Seats</th>
                            <th>Timeslots</th>
                            <th colspan="6">Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        </tbody>

                    </table>
                </div>
                <div class="return-to-btn">
                    <a href="student-profile.html">Return to Profile</a>
                </div>
            </div>
        </div>

        <footer>

        </footer>
        <script>
            document.addEventListener("DOMContentLoaded", async () => {
                try {
                    const studentID = localStorage.getItem("studentID");

                    const res = await fetch(`http://localhost:5000/api/slots/reservations?studentID=${studentID}`);
                    const data = await res.json();

                    const tbody = document.querySelector(".selected-reserve tbody");
                    tbody.innerHTML = ""; // clear default row

                    if (!data.length) {
                    tbody.innerHTML = `<tr><td colspan="11">No reservations found.</td></tr>`;
                    return;
                    }

                    data.forEach((reservation, index) => {
                    const row = document.createElement("tr");

                    // format date
                    const formattedDate = new Date(reservation.date).toLocaleDateString();

                    // room + building
                    const room = reservation.labID?.room || "N/A";
                    const building = reservation.labID?.buildingID?.name || "N/A";

                    // timeslot
                    const timeSlot = `${reservation.startTime}-${reservation.endTime}`;

                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${formattedDate}</td>
                        <td>${building}</td>
                        <td>${room}</td>
                        <td>${reservation.seats}</td>
                        <td>${timeSlot}</td>
                        <td>${reservation.status}</td>
                    `;

                    tbody.appendChild(row);
                    });

                } catch (err) {
                    console.error("Error loading reservations:", err);
                }
                });
        </script>
        </div>
    </body>
</html>
