<!DOCTYPE html>
<html>
    <head>
        <title>Reservation Details | LabSys</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/reservation.css">
    </head>
    <body>
        <header>
            <div class="container">
                <img src="images/dlsu-logo-white.png" alt="DLSU logo">
                <h1>LabSys</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="student-profile.html">View Profile</a></li>
                    <li><a href="reservation.html">Make a Reservation</a></li>
                </ul>
            </nav>
            <a id="logout-btn" href="index.html">Log Out</a>
        </header>

        <div class="content">
            <h1>Reservation Details</h1>

            <!-- reservation summary: shows selected rooms, date, and seats -->
            <section id="summary">
                <h2>Selected Reservation</h2>
            </section>

            <!-- details form: collect student info -->
            <section>
                <h2>Student Information</h2>

                <form id="detailsForm">

                    <!-- primary student details -->
                    <h3>Student Details</h3>
                    <div class="student">
                        <input type="text" id="mainId" placeholder="ID Number" required>
                        <input type="text" id="mainName" placeholder="Last Name, First Name" required>
                        <select id="mainCollege" required>
                            <option value="" disabled selected>Select College</option>
                            <option value="CLA">CLA</option>
                            <option value="BAGCED">BAGCED</option>
                            <option value="GCOE">GCOE</option>
                            <option value="COS">COS</option>
                            <option value="CCS">CCS</option>
                            <option value="RVRCOB">RVRCOB</option>
                            <option value="CLTSOE">CLTSOE</option>
                        </select>
                    </div>

                    <!-- additional students section -->
                    <h3 id="additionalHeader">Additional Student(s) Details</h3>
                    <div id="additionalStudents"></div>

                    <!-- buttons to add more students and submit form -->
                    <button type="button" id="addStudent">+ Add Another Student</button>
                    <button type="submit">Submit Reservation</button>

                </form>
            </section>

                <!-- user navigation buttons -->
                <div class="actions">
                    <a href="student-profile.html" class="action-button">Return to Profile</a>
                    <a href="reservation.html" class="action-button">Back to Reservation</a>
                    <button id="logoutConfirm" class="action-button logout">Logout</button>
                </div>
        </div>


        <script>
            // load current user from sessionStorage (set during login)
            const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));
            if (!currentUser) {
                alert("Student not logged in.");
                window.location.href = "index.html";
            }

            // save student ID to localStorage for use in reservation submission (can be accessed in details.html)
            localStorage.setItem("studentID", currentUser._id);

            // pre-fill primary student details in form using currentUser data
            document.getElementById("mainId").value = currentUser.idNumber || "";
            document.getElementById("mainName").value = currentUser.lastName + ", " + currentUser.firstName;
            document.getElementById("mainCollege").value = currentUser.college || "";

            // load reservation data from localStorage
            const venue = localStorage.getItem("venue");
            const reservationData = JSON.parse(localStorage.getItem("reservationData")) || {};

            const seats = reservationData.seats || 1;
            const slots = reservationData.slots || [];
            const date = reservationData.date;

            // build html summary of selected rooms and times
            let summaryHTML = "";
            const rooms = [...new Set(slots.map(slot => slot.room))];
            rooms.forEach(room => {
                const roomSlots = slots
                    .filter(slot => slot.room === room)
                    .sort((a, b) => a.startTime.localeCompare(b.startTime));

                const startTime = roomSlots[0].startTime;
                const endTime = roomSlots[roomSlots.length - 1].endTime;

                summaryHTML += `<p><strong>Room:</strong> ${room} &nbsp;&nbsp; <strong>Time:</strong> ${startTime} - ${endTime}</p>`;
            });

            // insert summary into html
            document.getElementById("summary").innerHTML = `
                <p><strong>Date:</strong> ${date}</p>
                <p><strong>Number of Seats:</strong> ${seats}</p>
                ${summaryHTML}
            `;

            // hide additional students section if only 1 seat reserved
            const additionalHeader = document.getElementById("additionalHeader");
            const addStudentButton = document.getElementById("addStudent"); // renamed variable

            if (seats <= 1) {
                additionalHeader.style.display = "none";
                addStudentButton.style.display = "none";
            }

            // logout confirmation popup
            function showLogoutConfirm() {
                const popUp = document.createElement("div");
                popUp.id = "logoutpopUp";
                popUp.classList.add("popUp");
                popUp.innerHTML = `
                    <p>Are you sure you want to log out?</p>
                    <div class="popUp-buttons">
                        <button id="confirmLogout">Yes</button>
                        <button id="cancelLogout">No</button>
                    </div>
                `;

                document.body.appendChild(popUp);

                // show popup with slight delay for animation
                setTimeout(() => popUp.classList.add("show"), 10);

                // confirm logout
                document.getElementById("confirmLogout").addEventListener("click", () => {
                    localStorage.clear();
                    window.location.href = "index.html";
                });

                // cancel logout
                document.getElementById("cancelLogout").addEventListener("click", () => {
                    popUp.classList.remove("show");
                    setTimeout(() => popUp.remove(), 300);
                });
            }

            // attach logout popup to button
            document.getElementById("logoutConfirm").addEventListener("click", showLogoutConfirm);

            // logic to add additional students
            let addedStudents = 0;
            const maxAdditional = seats > 1 ? seats - 1 : 0;

            const addButton = document.getElementById("addStudent");
            if (maxAdditional === 0) addButton.style.display = "none";

            addButton.addEventListener("click", () => {
                if (addedStudents >= maxAdditional) return;

                const container = document.createElement("div");
                container.classList.add("student");
                container.innerHTML = `
                    <input type="text" placeholder="ID Number" required>
                    <input type="text" placeholder="Last Name, First Name" required>
                    <select required>
                        <option value="" disabled selected>Select College</option>
                        <option value="CLA">CLA</option>
                        <option value="BAGCED">BAGCED</option>
                        <option value="GCOE">GCOE</option>
                        <option value="COS">COS</option>
                        <option value="CCS">CCS</option>
                        <option value="RVRCOB">RVRCOB</option>
                        <option value="CLTSOE">CLTSOE</option>
                    </select>
                `;

                document.getElementById("additionalStudents").appendChild(container);
                addedStudents++;

                if (addedStudents >= maxAdditional) addButton.style.display = "none";
            });


            let labs = [];

            // fetch labs from backend
            async function loadLabs() {
                try {
                    const res = await fetch("http://localhost:5000/api/labs");
                    labs = await res.json();
                    console.log("Labs loaded:", labs);

                    // create a quick lookup map: roomName -> labID
                    window.labMap = {};
                    labs.forEach(l => {window.labMap[l.room] = l._id;});

                } catch (err) {
                    console.error("Failed to load labs:", err);
                    alert("Could not load lab data. Try again later.");
                }
            }

            // ensure labs are loaded before allowing form submission
            document.addEventListener("DOMContentLoaded", async () => {
                await loadLabs();
            });

            // form submission logic
            document.getElementById("detailsForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                // use the logged-in student
                const studentID = currentUser._id;

                // primary student details from form inputs
                const primaryStudent = {
                    id: document.getElementById("mainId").value,
                    name: document.getElementById("mainName").value,
                    college: document.getElementById("mainCollege").value
                };

                // additional students from form inputs
                const additional = Array.from(document.querySelectorAll("#additionalStudents .student")).map(div => {
                    const inputs = div.querySelectorAll("input, select");
                    return {
                        id: inputs[0].value,
                        name: inputs[1].value,
                        college: inputs[2].value
                    };
                });

                const selectedSlots = JSON.parse(localStorage.getItem("selectedSlots")) || [];
                if (selectedSlots.length === 0) {
                    alert("No slots selected.");
                    return;
                }

                try {
                    for (const slot of selectedSlots) {
                        const labID = window.labMap[slot.room];
                        if (!labID) {
                            alert(`Lab not found for room ${slot.room}`);
                            continue;
                        }

                        // const slot_ID = await getSlotID(labID, slot.startTime);

                        const res = await fetch("http://localhost:5000/api/slots/book", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                labID,
                                studentID,
                                startTime: slot.startTime,
                                endTime: slot.endTime,
                                date,
                                seats,
                                primaryStudent,
                                additionalStudents: additional
                            })
                        });

                        const result = await res.json();
                        if (!res.ok) {
                            alert("Error booking slot: " + (result.message || "Unknown error"));
                            console.error(result);
                            return;
                        }
                    }

                    alert("Reservation submitted successfully!");
                    window.location.href = "view-reservation.html";
                } catch (err) {
                    console.error("Booking failed:", err);
                    alert("Server error. Please try again later.");
                }
            });
        </script>
    </body>
</html>
