<!DOCTYPE html>
<html>
    <head>
         <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cancel Reservation | LabSys</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/cancel.css">
       
    </head>
    <body class="cancel-page">
        <header>
            <div class="container">
                <img src="images/dlsu-logo-white.png" alt="DLSU logo">
                <h1>LabSys</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="student-profile.html">View Profile</a></li>
                    <li><a href="reservation.html">Make a Reservation</a></li>
                </ul>
            </nav>
            <a id="logout-btn" href="index.html">Log Out</a>
        </header>

        <div class="content">
            <div class="cancel-pane">
               
                <h1>
                    Cancel Reservation
                </h1>

                <div class="reservation-pane">
                    <table class="selected-reserve">
                        <thead>
                        <tr>
                            <th>Reservation No.</th>
                            <th>Date</th>
                            <th>Building</th>
                            <th>Room No.</th>
                            <th>Number of Seats</th>
                            <th>Timeslots</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                       <!--- <tr>
                            <td>12345</td>
                            <td>11/11/1111</td>
                            <td>Gokongwei</td>
                            <td>304</td>
                            <td>5</td>
                            <td>5:00-6:30</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                        </tr> -->
                        </tbody>
                    </table>
                </div>
                <div class="cancel-btn">
                    <button id="deleteBtn">Cancel Reservation</button>
                </div>
            </div>
        </div>
        <footer>
        </footer>
        <script>
            document.addEventListener("DOMContentLoaded", async () => {
                const params = new URLSearchParams(window.location.search);
                const reservationID = params.get("reservationID"); // get the selected reservation ID
                const tbody = document.querySelector(".selected-reserve tbody");

                try {
                    const studentID = localStorage.getItem("studentID");
                    const res = await fetch(`http://localhost:5000/api/slots/reservations?studentID=${studentID}`);
                    const reservations = await res.json();

                    tbody.innerHTML = ""; // clear any default rows

                    if (!reservations.length) {
                        tbody.innerHTML = `<tr><td colspan="7">No reservations found.</td></tr>`;
                        return;
                    }

                    reservations.forEach((reservation, index) => {
                        const row = document.createElement("tr");

                        // format date
                        const formattedDate = new Date(reservation.date).toLocaleDateString();
                        const room = reservation.labID?.room || "N/A";
                        const building = reservation.labID?.buildingID?.name || "N/A";
                        const timeSlot = `${reservation.startTime}-${reservation.endTime}`;

                        row.innerHTML = `
                            <td>${index + 1}</td>
                            <td>${formattedDate}</td>
                            <td>${building}</td>
                            <td>${room}</td>
                            <td>${reservation.seats}</td>
                            <td>${timeSlot}</td>
                            <td>${reservation.status}</td>
                        `;

                        // Highlight only the selected reservation
                        if (reservation._id === reservationID) {
                            row.classList.add("selected"); // make sure your CSS has .selected { color:red; } or similar
                        }

                        tbody.appendChild(row);
                    });

                } catch (err) {
                    console.error("Error loading reservations:", err);
                }

                // Delete button
                document.getElementById("deleteBtn").addEventListener("click", () => {
                    if (!reservationID) {
                        alert("No reservation selected.");
                        return;
                    }

                    if (confirm("Are you sure you want to cancel this reservation?")) {
                        deleteReservation(reservationID);
                    }
                });
            });

            async function deleteReservation(reservationID) {
                try {
                    const res = await fetch(
                        `http://localhost:5000/api/slots/reservations/${reservationID}`,
                        {
                            method: "DELETE"
                        }
                    );

                    const data = await res.json();

                    if (!res.ok) {
                        alert(data.message);
                        return;
                    }

                    alert("Reservation cancelled!");
                    window.location.href = "student-profile.html";

                } catch (err) {
                    console.error(err);
                    alert("Error deleting reservation");
                }
            }

            // update function
            async function updateReservation(reservationID) {
                try {
                    const res = await fetch(
                    `http://localhost:5000/api/slots/reservations/${reservationID}`,
                    {
                        method: "PUT",
                        headers: {
                        "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                        labID: selectedLabID,
                        startTime: selectedStart,
                        endTime: selectedEnd,
                        date: selectedDate,
                        seats: selectedSeats
                        })
                    }
                    );

                    const data = await res.json();

                    if (!res.ok) {
                    alert(data.message);
                    return;
                    }

                    alert("Reservation updated!");
                    window.location.href = "student-profile.html";

                } catch (err) {
                    console.error(err);
                }
                }
        </script>
        </div>
    </body>
</html>
