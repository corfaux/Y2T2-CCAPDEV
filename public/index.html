<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LabSys</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/index.css">
        <script type="text/javascript" src="js/data.js" defer></script>
        <script type="module" src="js/index.js" defer></script>
    </head>

    <body>
        <header>
            <div class="container">
                <img src="images/dlsu-logo-white.png" alt="DLSU logo">
                <h1>LabSys</h1>
            </div> 
        </header>

        <div class="content">
            <div class="login-pane">
                <div class="welcome-message">
                    <h2>Welcome, Lasallian!</h2>
                    <p>Use your DLSU email address to continue with LabSys!</p>
                    <p class="signup">Don't have an account? <a href="signup.html">Sign up</a></p>
                </div>
                
                <form action="login" method="post">
                    <div class="email">
                        <label for="email-field">Email Address</label>
                        <input id="email-field" name="email" type="text">
                    </div>
                    <div class="password">
                        <label for="password-field">Password</label>
                        <input id="password-field" name="password" type="password">
                    </div>
                    
                    <button id="login-btn" type="submit">Log in</button>
                </form>
            </div> 
        </div>

        <footer>
            
        </footer>
    </body>
</html>
