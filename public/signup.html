<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LabSys</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/signup.css">
        <script type="text/javascript" src="js/data.js" defer></script>
        <script type="module" src="js/signup.js" defer></script>
    </head>

    <body>
        <header>
            <div class="container">
                <img src="images/dlsu-logo-white.png" alt="DLSU logo">
                <h1>LabSys</h1>
            </div> 
        </header>

        <div class="content">
            <div class="signup-pane">
                <h2>Sign up</h2>
                
                <form action="signup" method="post">
                    <div class="container">
                        <label for="first-name">First Name</label>
                        <input id="first-name" type="text">
                    </div>
                    
                    <div class="container">
                        <label for="last-name">Last Name</label>
                        <input id="last-name" type="text">
                    </div>

                    <div class="email">
                        <label for="email-field">Email Address</label>
                        <input id="email-field" type="text">
                    </div>

                    <div class="password">
                        <label for="password-field">Password</label>
                        <input id="password-field" type="password">
                    </div>

                    <button id="signup-btn" type="submit">Sign up</button>
                </form>

                <p class="signup">Already have a LabSys account? <a href="index.html">Log in</a></p>
            </div> 
        </div>

        <footer>
            
        </footer>
    </body>
</html>
