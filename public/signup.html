<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LabSys</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/signup.css">
        <script type="module" src="js/signup.js" defer></script>
    </head>

    <body>
        <header>
            <div class="container">
                <img src="images/dlsu-logo-white.png" alt="DLSU logo">
                <h1>LabSys</h1>
            </div> 
        </header>

        <div class="content">
            <div class="signup-pane">
                <h2>Sign up</h2>
                
                <form id="signup-form" action="signup" method="post" autocomplete="off">
                    <div class="labels">
                        <label for="first-name">First Name</label>
                        <label for="last-name">Last Name</label>
                        <label for="id">ID Number</label>
                        <label for="email">Email</label>
                        <label for="password">Password</label>
                    </div>

                    <div class="fields">
                        <input id="first-name" type="text" autocapitalize="words">
                        <small class="error">Please enter your first name.</small>

                        <input id="last-name" type="text" autocapitalize="words">
                        <small class="error">Please enter your last name.</small>

                        <input id="id" type="tel" maxlength="8">
                        <small class="error">ID ERROR</small>

                        <input id="email" type="email">
                        <small class="error">EMAIL ERROR</small>

                        <input id="password" type="password">
                        <small class="error">PASSWORD ERROR</small>
                    </div>
                </form>

                <button id="signup-btn" type="submit" form="signup-form">Sign up</button>
                <small>Already have a LabSys account? <a href="index.html">Log in</a></small>
            </div> 
        </div>

        <footer>
            
        </footer>
    </body>
</html>
