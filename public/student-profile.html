<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Profile | LabSys</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/student-profile.css">0
        <script type="module" src="js/student-profile.js" defer></script>
    </head>

    <body>
        <header>
            <div class="container">
                <img src="images/dlsu-logo-white.png" alt="DLSU logo">
                <h1>LabSys</h1>
            </div> 
            <nav>
                <ul>
                    <li><a href="#">View Profile</a></li>
                    <li><a href="reservation.html">Make a Reservation</a></li>
                    <!--<li><a href="">Cancel Reservation</a></li>-->
                </ul>
            </nav>
            <a id="logout-btn" href="index.html">Log Out</a>
        </header>

        <div class="content">
            <div class="container">
                <button id="delete-account-btn">Delete account</button>
                <h2>Student Profile</h2>
            </div>
            <button id="adminBackBtn" style="display:none;">
                Back to Admin Reservations
            </button>

            <form id="profile-form" method="post">
                <div class="container">
                    <div class="profile-pic">
                        <img src="images/default-profile-pic.jpg" alt="profile picture">
                        <label for="photo" id="update-pic-btn">Update photo</label>
                        <input id="photo" name="photo" type="file" accept="image/jpg, image/jpeg, image/png, image/webp">
                    </div>

                    <textarea id="description" name="description" placeholder="A short description about you..."></textarea>
                </div>
                
                <div class="details">
                    <div class="personal-info">
                        <h3>Personal Information</h2>

                        <div class="name">
                            <div class="container">
                                <label for="first-name">First Name</label>
                                <input id="first-name" name="firstName" type="text" readonly>
                            </div>
                            
                            <div class="container">
                                <label for="last-name">Last Name</label>
                                <input id="last-name" name="lastName" type="text" readonly>
                            </div>
                        </div>

                        <div class="email">
                            <label for="email-address">Email Address</label>
                            <input id="email-address" name="email" type="text" readonly>
                        </div>
                        
                        <div class="contact">
                            <label for="contact-number">Contact No.</label>
                            <input id="contact-number" name="contactNumber" type="text" placeholder="09XXXXXXXXX">
                        </div>
                    </div>
                    <div class="student-info">
                        <h3>Student Information</h2>

                        <div class="id-number">
                            <label for="id-num">ID Number</label>
                            <input id="id-num" name="idNumber" type="text">
                        </div>
                        
                        <div class="college">
                            <label for="college-dropdown">College</label>
                            <select id="college-dropdown" name="college">
                                <option value="none">-</option>
                                <option value="CCS">CCS</option>
                                <option value="GCOE">GCOE</option>
                                <option value="COS">COS</option>
                                <option value="CLA">CLA</option>
                                <option value="RVRCOB">RVRCOB</option>
                                <option value="CLTSOE">CLTSOE</option>
                                <option value="BAGCED">BAGCED</option>
                                <option value="TDSOL">TDSOL</option>
                            </select>
                        </div>

                        <button class="save-profile-btn" type="submit" disabled>Save profile</button>
                    </div>
                </div>
            </form>
            
            <h2>Current Reservations</h2>
            <div class="reservation-preview">
                <table>
                    <thead>
                        <tr>
                            <th>Reservation No.</th>
                            <th>Date</th>
                            <th>Building</th>
                            <th>Room No.</th>
                            <th>Timeslot/s</th>
                            <th>Status</th>
                            <th>Cancel Reservation</th>
                            <th>Edit Reservation</th>
                        </tr>
                    </thead>
                    <tbody id="reservation-tbody">
                        <!--
                        <tr>
                            <td>1</td>
                            <td>2026-02-11</td>
                            <td>Gokongwei</td>
                            <td>304B</td>
                            <td class="table-timeslots">10:00-10:30</td>
                            <td class="table-timeslots">-</td>
                            <td class="table-timeslots">-</td>
                            <td class="table-timeslots">-</td>
                            <td class="table-timeslots">-</td>
                            <td class="table-timeslots">-</td>
                            <td><button class="cancelBtn" onclick="location.href='cancel.html'">Cancel</button></td>
                        </tr>
                        <tr>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td></td>
                        </tr>
                     -->
                    </tbody>
                </table>
                
            </div>
            <p>You have 0/2 reservations as of now.</p> <!-- is this necessary-->
        </div>

        <footer>
            
        </footer>
        <script>
            document.addEventListener("DOMContentLoaded", async () => {
                try {
                    const studentID = localStorage.getItem("studentID");
                    const res = await fetch(`http://localhost:3000/api/slots/reservations?studentID=${studentID}`);
                    const reservations = await res.json();

                    const tbody = document.getElementById("reservation-tbody");
                    tbody.innerHTML = ""; // clear default rows

                    if (!reservations.length) {
                        tbody.innerHTML = `<tr><td colspan="12">No reservations found.</td></tr>`;
                        return;
                    }

                    reservations.forEach((reservation, index) => {
                        const row = document.createElement("tr");

                        // format date
                        const formattedDate = new Date(reservation.date).toLocaleDateString();

                        // room + building
                        const room = reservation.labID?.room || "N/A";
                        const building = reservation.labID?.buildingID?.name || "N/A";

                        // timeslots: we can assume one slot per row or multiple if needed
                        const timeSlot = `${reservation.startTime}-${reservation.endTime}`;

                        row.innerHTML = `
                            <td>${index + 1}</td>
                            <td>${formattedDate}</td>
                            <td>${building}</td>
                            <td>${room}</td>
                            <td class="table-timeslots">${timeSlot}</td>
                            <td>${reservation.status || "N/A"}</td>
                            <td><button class="cancelBtn" onclick="location.href='cancel.html?reservationID=${reservation._id}'">Cancel</button></td>
                            <td><button class="editBtn" onclick="location.href='reservation.html?reservationID=${reservation._id}'">Edit</button></td>
                        `;

                        tbody.appendChild(row);
                    });

                    // Optionally, update the reservation count below the table
                    const countParagraph = document.querySelector("p");
                    countParagraph.textContent = `You have ${reservations.length}/2 reservations as of now.`;

                } catch (err) {
                    console.error("Error loading reservations:", err);
                }
            });
        </script>
    </body>
</html>
